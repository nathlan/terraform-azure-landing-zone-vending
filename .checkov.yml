---
# Checkov Configuration for Terraform Module
# This configuration is optimized for security scanning of wrapper modules

framework:
  - terraform

skip-check:
  # CKV_TF_1: Allow registry modules to use version constraints instead of commit hashes
  # This is acceptable for published registry modules using semantic versioning
  - CKV_TF_1

download-external-modules: false
compact: true
quiet: true

soft-fail: false
